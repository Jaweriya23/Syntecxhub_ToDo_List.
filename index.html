<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0b2b24;
    --bg2:#123f34;
    --card:#fbf7ee;
    --card-dim:#efe8d6;
    --ink:#16241f;
    --coral:#ff7a59;
    --coral-dim:#e8613f;
    --gold:#e3b23c;
    --sage:#6fa084;
    --muted:#8a9a90;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 8%, #164a3c 0%, transparent 42%),
      radial-gradient(circle at 88% 92%, #0e332a 0%, transparent 48%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    font-family:'IBM Plex Mono', monospace;
    color:var(--ink);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 16px;
  }

  .board{
    width:100%;
    max-width:480px;
  }

  .masthead{
    text-align:center;
    margin-bottom:20px;
    color:var(--card);
  }
  .masthead .eyebrow{
    letter-spacing:.35em;
    font-size:11px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .masthead h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(30px, 6vw, 40px);
    margin:0;
    letter-spacing:-.01em;
  }
  .masthead .sub{
    font-size:12px;
    color:#a9c2b8;
    margin-top:6px;
  }

  /* ---- Progress vine ---- */
  .progress-wrap{
    margin:22px 0 20px;
  }
  .progress-track{
    position:relative;
    height:6px;
    border-radius:6px;
    background:rgba(255,255,255,.12);
    overflow:visible;
  }
  .progress-fill{
    height:100%;
    border-radius:6px;
    background:linear-gradient(90deg, var(--sage), var(--gold), var(--coral));
    width:0%;
    transition:width .3s ease;
  }
  .progress-marker{
    position:absolute;
    top:50%;
    left:0%;
    transform:translate(-50%,-50%);
    font-size:16px;
    transition:left .3s ease;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));
  }
  .progress-label{
    display:flex;
    justify-content:space-between;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#a9c2b8;
    margin-top:8px;
  }
  .progress-label b{ color:var(--gold); font-weight:600; }

  /* ---- Add row ---- */
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:22px;
    background:var(--card);
    padding:10px;
    border-radius:14px;
    box-shadow:0 12px 26px rgba(0,0,0,.35);
  }
  .add-row input{
    flex:1;
    border:none;
    background:transparent;
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    padding:8px 10px;
    outline:none;
    color:var(--ink);
  }
  .add-row input::placeholder{ color:#9a9280; }
  .add-row button{
    border:none;
    background:var(--coral);
    color:#fff5ef;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:14px;
    padding:0 18px;
    border-radius:9px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:transform .12s ease, background .12s ease;
  }
  .add-row button:hover{ background:var(--coral-dim); transform:translateY(-1px); }
  .add-row button:active{ transform:translateY(0); }

  /* ---- Task list ---- */
  #list{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .task{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--card);
    border-radius:12px;
    padding:13px 12px 13px 14px;
    box-shadow:0 6px 14px rgba(0,0,0,.28);
    border-left:4px solid var(--sage);
    animation:sprout .28s ease;
  }
  .task.done{ border-left-color:var(--gold); opacity:.72; }

  @keyframes sprout{
    from{ opacity:0; transform:translateY(-6px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .seed{
    flex-shrink:0;
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid var(--sage);
    background:transparent;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    color:transparent;
    transition:all .18s ease;
  }
  .seed:hover{ border-color:var(--coral); }
  .task.done .seed{
    background:var(--sage);
    border-color:var(--sage);
    color:var(--card);
  }

  .task-text{
    flex:1;
    font-size:15px;
    line-height:1.4;
    word-break:break-word;
    transition:color .15s ease;
  }
  .task.done .task-text{
    text-decoration:line-through;
    color:#9a9280;
  }

  .leaf-tag{
    flex-shrink:0;
    font-size:14px;
    opacity:0;
    transform:scale(.6);
    transition:all .2s ease;
  }
  .task.done .leaf-tag{ opacity:1; transform:scale(1); }

  .del{
    flex-shrink:0;
    border:none;
    background:transparent;
    color:#b9ae94;
    cursor:pointer;
    font-size:15px;
    width:28px;
    height:28px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease, color .15s ease;
  }
  .del:hover{ background:#fbe1da; color:var(--coral-dim); }

  .empty{
    text-align:center;
    color:var(--card-dim);
    padding:40px 20px;
    font-size:13px;
    letter-spacing:.05em;
  }
  .empty .glyph{ font-size:30px; display:block; margin-bottom:10px; }

  footer{
    text-align:center;
    color:#5e8a76;
    font-size:11px;
    margin-top:26px;
    letter-spacing:.08em;
  }

  @media (max-width:420px){
    .masthead h1{ font-size:27px; }
  }

  @media (prefers-reduced-motion: reduce){
    .task{ animation:none; }
  }
</style>
</head>
<body>

<div class="board">
  <div class="masthead">
    <div class="eyebrow">Today's Growth</div>
    <h1>To-Do List</h1>
    <div class="sub">Plant a task. Watch it bloom when it's done.</div>
  </div>

  <div class="add-row">
    <input id="taskInput" type="text" placeholder="What needs doing?" maxlength="120" autocomplete="off">
    <button id="addBtn" aria-label="Add task">＋ ADD</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-marker" id="progressMarker">🌱</div>
    </div>
    <div class="progress-label">
      <span>Open: <b id="openCount">0</b></span>
      <span>Bloomed: <b id="doneCount">0</b></span>
    </div>
  </div>

  <ul id="list"></ul>
  <footer>Saved locally in your browser · nothing leaves this page</footer>
</div>

<script>
(function(){
  const STORAGE_KEY = "todo-list-v2";
  const list = document.getElementById("list");
  const input = document.getElementById("taskInput");
  const addBtn = document.getElementById("addBtn");
  const openCount = document.getElementById("openCount");
  const doneCount = document.getElementById("doneCount");
  const progressFill = document.getElementById("progressFill");
  const progressMarker = document.getElementById("progressMarker");

  let tasks = load();

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }

  function addTask(text){
    const trimmed = text.trim();
    if(!trimmed) return;
    tasks.unshift({ id: uid(), text: trimmed, done: false });
    save();
    render();
  }

  function toggleTask(id){
    const t = tasks.find(t => t.id === id);
    if(t){ t.done = !t.done; save(); render(); }
  }

  function deleteTask(id){
    const el = document.querySelector(`[data-id="${id}"]`);
    if(el){
      el.style.transition = "opacity .18s ease, transform .18s ease";
      el.style.opacity = "0";
      el.style.transform = "translateX(12px)";
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, 160);
    }else{
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }
  }

  function render(){
    list.innerHTML = "";

    if(tasks.length === 0){
      list.innerHTML = `
        <li class="empty">
          <span class="glyph">🌾</span>
          Nothing planted yet. Add your first task above.
        </li>`;
    }else{
      tasks.forEach(t => {
        const li = document.createElement("li");
        li.className = "task" + (t.done ? " done" : "");
        li.setAttribute("data-id", t.id);
        li.innerHTML = `
          <button class="seed" aria-label="Toggle complete">${t.done ? "✓" : ""}</button>
          <span class="task-text"></span>
          <span class="leaf-tag">🌿</span>
          <button class="del" aria-label="Delete task">✕</button>
        `;
        li.querySelector(".task-text").textContent = t.text;
        li.querySelector(".seed").addEventListener("click", () => toggleTask(t.id));
        li.querySelector(".del").addEventListener("click", () => deleteTask(t.id));
        list.appendChild(li);
      });
    }

    const doneN = tasks.filter(t => t.done).length;
    const total = tasks.length;
    const pct = total === 0 ? 0 : Math.round((doneN / total) * 100);

    openCount.textContent = total - doneN;
    doneCount.textContent = doneN;
    progressFill.style.width = pct + "%";
    progressMarker.style.left = pct + "%";
    progressMarker.textContent = pct === 100 && total > 0 ? "🌸" : "🌱";
  }

  addBtn.addEventListener("click", () => {
    addTask(input.value);
    input.value = "";
    input.focus();
  });

  input.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      addTask(input.value);
      input.value = "";
    }
  });

  render();
})();
</script>

</body>
</html>
